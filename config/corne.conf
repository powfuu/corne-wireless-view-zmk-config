# Corne configuration - Zero power saving, OLED always on
# Disable all power management features
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=0
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# Enable display and keep it active
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y   # si usas pantalla personalizada
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=5

# External power control for OLED (necesario si el VCC del OLED está conectado a un GPIO)
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_EXT_POWER_GPIO=y
# ⚠️ IMPORTANTE: Además de esto, tu shield overlay debe definir el nodo ext-power
# con el GPIO correcto y la propiedad 'init'. Ejemplo:
# / {
#     ext-power {
#         compatible = "zmk,ext-power-generic";
#         control-gpios = <&gpio0 13 GPIO_ACTIVE_HIGH>;
#         init;
#     };
# };

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Clock source
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Debouncing rápido
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Si no usas RGB externo
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
