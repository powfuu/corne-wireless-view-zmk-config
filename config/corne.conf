# --- BLUETOOTH / CONEXIÓN ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- RESPUESTA DE TECLAS ---
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# --- ZMK STUDIO ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# --- POWER / IDLE ---
# Timeout de 10 minutos (600000 ms)
CONFIG_ZMK_IDLE_TIMEOUT=600000

# --- DISPLAY (nice!view) - CONFIGURACIÓN CLAVE ---
# Habilita la energía externa para la pantalla (IMPRESCINDIBLE)
CONFIG_ZMK_EXT_POWER=y
# Aumenta el pool de memoria para los widgets (soluciona fallos de inicio) [citation:3]
CONFIG_LV_Z_MEM_POOL_SIZE=4608

