# ====================================================
# CORNE CONFIG - SIN AHORRO DE ENERGÍA, OLED SIEMPRE ENCENDIDO
# ====================================================

# Desactivar completamente el sueño del teclado
CONFIG_ZMK_SLEEP=n
# (No se necesita ZMK_IDLE_SLEEP_TIMEOUT porque ZMK_SLEEP=n)

# Desactivar power management general del SoC
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# Display OLED
CONFIG_ZMK_DISPLAY=y
# Si usas una pantalla personalizada (ej. con logotipo), mantén esta línea:
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
# Prioridad del hilo de la pantalla (opcional)
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=5

# Control de alimentación externa (para el OLED)
CONFIG_ZMK_EXT_POWER=y
# ¡NO USES ZMK_EXT_POWER_GPIO! Esa opción no existe.

# Bluetooth / BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # Mayor alcance
CONFIG_BT_CTLR_PHY_2M=n              # No usar 2M PHY
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y       # Entrada de passkey

# Reloj interno RC (ahorra pines)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Debouncing rápido
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ZMK Studio (edición de keymaps en caliente)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Si NO usas RGB controlado por EXT_POWER
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
