# ====================================================
# CORNE - SIN AHORRO Y CON EXTERNAL POWER FIJO
# ====================================================

# Desactivar sueño COMPLETAMENTE
CONFIG_ZMK_SLEEP=n
# No hace falta CONFIG_ZMK_IDLE_SLEEP_TIMEOUT si el sleep está desactivado

# Desactivar power management del SoC
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# --- Display OLED ---
CONFIG_ZMK_DISPLAY=y
# IMPORTANTE: NO uses ZMK_DISPLAY_STATUS_SCREEN (no existe)
# Si usas pantalla personalizada, mantén esta:
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=5

# --- External Power CRÍTICO ---
CONFIG_ZMK_EXT_POWER=y
# NO uses CONFIG_ZMK_EXT_POWER_GPIO (no existe)

# --- Bluetooth / BLE (sin cambios) ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Reloj interno RC
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Debouncing rápido
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Si NO usas RGB controlado por EXT_POWER
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
