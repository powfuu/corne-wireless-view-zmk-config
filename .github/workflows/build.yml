name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create shield directory and copy overlay
        run: |
          mkdir -p config/boards/shields/corne
          cp config/corne.overlay config/boards/shields/corne/corne.overlay

      - name: Build left
        uses: zmkfirmware/zmk-build-action@v1
        with:
          board: nice_nano_v2
          shield: corne_left nice_oled
          artifact-name: corne_left.uf2

      - name: Build right
        uses: zmkfirmware/zmk-build-action@v1
        with:
          board: nice_nano_v2
          shield: corne_right nice_oled
          artifact-name: corne_right.uf2
